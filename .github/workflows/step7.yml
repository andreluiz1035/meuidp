name: Step 7 - Ajuste Hosts IDP

on:
  workflow_call:

jobs:
  adjust-hosts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_MCSE }}

      - name: Give execute permission to script
        run: chmod +x step7/ajuste.sh

      - name: Run adjustment script
        run: ./step7/ajuste.sh