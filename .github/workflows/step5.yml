name: Build and Push PHP Container

on:
  workflow_call:  
      
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_MCSE }}

      - name: Login to ACR
        run: az acr login --name meuacr123xyz

      - name: Build Docker Image
        run: |
          docker build -t meuacr123xyz.azurecr.io/idp:latest ./step5

      - name: Push Docker Image to ACR
        run: |
          docker push meuacr123xyz.azurecr.io/idp:latest